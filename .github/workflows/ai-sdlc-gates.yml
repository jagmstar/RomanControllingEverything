name: AI-SDLC Gate Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 */6 * * *"

jobs:
  gate-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
      - name: Run gate tests
        run: |
          python -m pytest meta/tests/test_commit_msg_gate.py meta/tests/test_closure_evidence_gate.py -v
      - name: Verify no fake #0 commits
        run: |
          if git log --oneline --all --grep="#0" | grep -q .; then
            echo "ERROR: Found fake #0 ticket references in git history"
            exit 1
          fi
          echo "OK: No fake #0 references found"
